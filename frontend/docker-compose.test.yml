services:
  supabase-test-db:
    image: supabase/postgres:latest
    container_name: supabase-test-db
    ports:
      - '54322:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SUPABASE_TEST_DB_PASSWORD:-testpassword123}
      POSTGRES_DB: postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - supabase-test-data:/var/lib/postgresql/data

volumes:
  supabase-test-data:
