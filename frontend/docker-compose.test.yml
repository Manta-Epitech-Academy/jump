services:
  postgres-test:
    image: postgres:18-alpine
    container_name: tekcamp-postgres-test
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: tekcamp
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: tekcamp_test
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tekcamp']
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - postgres-test-data:/var/lib/postgresql/data

volumes:
  postgres-test-data:
