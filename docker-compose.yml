services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: tekcamp
      POSTGRES_USER: tekcamp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - tekcamp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tekcamp"]
      interval: 5s
      timeout: 5s
      retries: 5

  sveltekit:
    build:
      context: frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tekcamp-network
    environment:
      - PORT=${PORT}
      - ORIGIN=${ORIGIN}
      - DATABASE_URL=postgresql://tekcamp:${POSTGRES_PASSWORD}@postgres:5432/tekcamp
      - HOST_HEADER=x-forwarded-host
    restart: unless-stopped

volumes:
  pg_data:

networks:
  tekcamp-network:
    driver: bridge
