services:
  pocketbase:
    image: ghcr.io/mateo-cabrera/tekcamp-pocketbase:latest
    ports:
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    networks:
      - tekcamp-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8090/api/health",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  sveltekit:
    image: ghcr.io/mateo-cabrera/tekcamp-sveltekit:latest
    env_file:
      - .env
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      pocketbase:
        condition: service_healthy
    networks:
      - tekcamp-network
    environment:
      - PORT=${PORT}
      - ORIGIN=${ORIGIN}
      - PUBLIC_POCKETBASE_URL=${PUBLIC_POCKETBASE_URL}
      - PUBLIC_INTERNAL_POCKETBASE_URL=http://pocketbase:8090
      - HOST_HEADER=x-forwarded-host
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower:1.7.1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /root/.docker/config.json:/config/config.json:ro
    environment:
      - DOCKER_API_VERSION=1.45
      - DOCKER_CONFIG=/config
    command: --interval 60 --cleanup --warn-on-head-failure never
    restart: unless-stopped

volumes:
  pb_data:

networks:
  tekcamp-network:
    driver: bridge
