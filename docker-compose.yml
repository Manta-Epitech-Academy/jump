services:
  pocketbase:
    build:
      context: ./pocketbase-backend
      tags:
        - tekcamp-pocketbase:latest
    ports:
      - '8090:8090'
    volumes:
      - pb_data:/pb/pb_data
    networks:
      - tekcamp-network
    restart: unless-stopped
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8090/api/health']
      interval: 5s
      timeout: 5s
      retries: 5

  sveltekit:
    build:
      context: ./frontend
      tags:
        - tekcamp-sveltekit:latest
    image: tekcamp-sveltekit:latest
    env_file:
      - .env
    ports:
      - '${PORT}:${PORT}'
    depends_on:
      pocketbase:
        condition: service_healthy
    networks:
      - tekcamp-network
    environment:
      - PORT=${PORT}
      - ORIGIN=${ORIGIN}
      - PUBLIC_POCKETBASE_URL=${PUBLIC_POCKETBASE_URL}
      # Renamed to PUBLIC_ so SvelteKit allows importing it in shared files
      - PUBLIC_INTERNAL_POCKETBASE_URL=http://pocketbase:8090
      - HOST_HEADER=x-forwarded-host
    # SSR needs to reach the host to find PocketBase on localhost
    extra_hosts:
      - 'localhost:host-gateway'
    restart: unless-stopped

volumes:
  pb_data:

networks:
  tekcamp-network:
    driver: bridge
