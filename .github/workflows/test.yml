name: Tests

on:
  pull_request:
    branches: [main, staging, dev]
  push:
    branches: [main]

defaults:
  run:
    working-directory: frontend

# Dummy env vars so prisma generate (postinstall) and the SvelteKit build
# (which evaluates BetterAuth at module load) succeed in CI.
# Jobs that need real values should override these in their step `env`.
env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
  ORIGIN: http://localhost:3030
  BETTER_AUTH_SECRET: ci-dummy-secret-not-used-at-runtime
  BETTER_AUTH_URL: http://localhost:3030
  MICROSOFT_CLIENT_ID: ci-dummy
  MICROSOFT_CLIENT_SECRET: ci-dummy
  MICROSOFT_TENANT_ID: ci-dummy
  RESEND_API_KEY: ci-dummy
  RESEND_FROM_EMAIL: noreply@example.com

jobs:
  lint-and-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Svelte Check
        run: bun run check

  unit-and-integration:
    name: Unit & Integration Tests
    needs: lint-and-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Run tests with coverage
        run: bun run test:coverage

  e2e:
    name: E2E Tests
    needs: unit-and-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build app
        run: bun run build

      - name: Run E2E tests
        run: bun run test:e2e
        env:
          CI: true
