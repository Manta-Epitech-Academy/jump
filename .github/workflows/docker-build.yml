name: Build and Push Docker Images

on:
  push:
    branches:
      - main
      - staging
      - dev

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/intra

jobs:
  build-sveltekit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          case "${{ github.ref_name }}" in
            main)    echo "tag=latest"  >> "$GITHUB_OUTPUT" ;;
            staging) echo "tag=staging" >> "$GITHUB_OUTPUT" ;;
            dev)     echo "tag=dev"     >> "$GITHUB_OUTPUT" ;;
          esac

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-sveltekit:${{ steps.tag.outputs.tag }}
          build-args: |
            PUBLIC_POCKETBASE_URL=${{ vars.PUBLIC_POCKETBASE_URL }}
            PUBLIC_INTERNAL_POCKETBASE_URL=${{ vars.PUBLIC_INTERNAL_POCKETBASE_URL }}
          cache-from: type=gha,scope=sveltekit-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=sveltekit-${{ github.ref_name }}
