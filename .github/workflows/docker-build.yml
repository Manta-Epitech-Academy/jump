name: Build and Push Docker Images

on:
  push:

env:
  REGISTRY: ghcr.io

jobs:
  build-sveltekit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      push: ${{ steps.meta.outputs.push }}
      namespace: ${{ steps.meta.outputs.namespace }}

    steps:
      - uses: actions/checkout@v6

      - name: Set image tag and prefix
        id: meta
        run: |
          PREFIX=$(echo "ghcr.io/${{ github.repository_owner }}/jump" | tr '[:upper:]' '[:lower:]')
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          SHOULD_PUSH=false
          case "${{ github.ref_name }}" in
            main)    echo "tag=latest"  >> "$GITHUB_OUTPUT"; SHOULD_PUSH=true; echo "namespace=jump-prod" >> "$GITHUB_OUTPUT" ;;
            staging) echo "tag=staging" >> "$GITHUB_OUTPUT"; SHOULD_PUSH=true; echo "namespace=jump-stg"  >> "$GITHUB_OUTPUT" ;;
            dev)     echo "tag=dev"     >> "$GITHUB_OUTPUT"; SHOULD_PUSH=true; echo "namespace=jump-dev"  >> "$GITHUB_OUTPUT" ;;
            *)       echo "tag=ci" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "push=$SHOULD_PUSH" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v4
        if: steps.meta.outputs.push == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: frontend
          push: ${{ steps.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.prefix }}-sveltekit:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=sveltekit-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=sveltekit-${{ github.ref_name }}

  restart-k3s:
    runs-on: ubuntu-latest
    needs: build-sveltekit
    if: needs.build-sveltekit.outputs.push == 'true'

    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          cat > ~/.kube/config <<EOF
          apiVersion: v1
          kind: Config
          clusters:
            - cluster:
                server: ${{ secrets.K3S_URL }}
                insecure-skip-tls-verify: true
              name: k3s
          contexts:
            - context:
                cluster: k3s
                user: k3s-user
              name: k3s
          current-context: k3s
          users:
            - name: k3s-user
              user:
                token: ${{ secrets.K3S_TOKEN }}
          EOF
          chmod 600 ~/.kube/config

      - name: Rollout restart deployment
        run: |
          NAMESPACE="${{ needs.build-sveltekit.outputs.namespace }}"
          echo "Restarting deployment in namespace: $NAMESPACE"
          kubectl rollout restart deployment/jump-sk -n "$NAMESPACE"
