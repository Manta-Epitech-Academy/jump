name: Build and Push Docker Images

on:
  push:

env:
  REGISTRY: ghcr.io

jobs:
  build-sveltekit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag and prefix
        id: meta
        run: |
          PREFIX=$(echo "ghcr.io/${{ github.repository_owner }}/jump" | tr '[:upper:]' '[:lower:]')
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          SHOULD_PUSH=false
          case "${{ github.ref_name }}" in
            main)    echo "tag=latest"  >> "$GITHUB_OUTPUT"; SHOULD_PUSH=true ;;
            staging) echo "tag=staging" >> "$GITHUB_OUTPUT"; SHOULD_PUSH=true ;;
            dev)     echo "tag=dev"     >> "$GITHUB_OUTPUT"; SHOULD_PUSH=true ;;
            *)       echo "tag=ci" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "push=$SHOULD_PUSH" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        if: steps.meta.outputs.push == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: frontend
          push: ${{ steps.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.prefix }}-sveltekit:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=sveltekit-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=sveltekit-${{ github.ref_name }}

  build-salesforce-service:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag and prefix
        id: meta
        run: |
          PREFIX=$(echo "ghcr.io/${{ github.repository_owner }}/jump" | tr '[:upper:]' '[:lower:]')
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          SHOULD_PUSH=false
          case "${{ github.ref_name }}" in
            main)    echo "tag=latest"  >> "$GITHUB_OUTPUT"; SHOULD_PUSH=true ;;
            staging) echo "tag=staging" >> "$GITHUB_OUTPUT"; SHOULD_PUSH=true ;;
            dev)     echo "tag=dev"     >> "$GITHUB_OUTPUT"; SHOULD_PUSH=true ;;
            *)       echo "tag=ci" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "push=$SHOULD_PUSH" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        if: steps.meta.outputs.push == 'true'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: salesforce-service
          push: ${{ steps.meta.outputs.push == 'true' }}
          tags: ${{ steps.meta.outputs.prefix }}-sfservice:${{ steps.meta.outputs.tag }}
          cache-from: type=gha,scope=salesforce-service-${{ github.ref_name }}
          cache-to: type=gha,mode=max,scope=salesforce-service-${{ github.ref_name }}
