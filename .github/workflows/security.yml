name: Security

on:
  pull_request:
    branches: [main, staging, dev]
  push:
    branches: [main]
  schedule:
    # Weekly scan: Monday 8:00 UTC
    - cron: "0 8 * * 1"

env:
  DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
  ORIGIN: http://localhost:3030
  BETTER_AUTH_SECRET: ci-dummy-secret-not-used-at-runtime
  BETTER_AUTH_URL: http://localhost:3030
  MICROSOFT_CLIENT_ID: ci-dummy
  MICROSOFT_CLIENT_SECRET: ci-dummy
  MICROSOFT_TENANT_ID: ci-dummy
  RESEND_API_KEY: ci-dummy
  RESEND_FROM_EMAIL: noreply@example.com
  DISCORD_CLIENT_ID: ci-dummy
  DISCORD_CLIENT_SECRET: ci-dummy

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install osv-scanner
        run: |
          OSV_SCANNER_VERSION=v2.3.5
          curl -sSfL -o osv-scanner "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64"
          curl -sSfL -o osv-scanner.sha256 "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64.sha256"
          sha256sum -c osv-scanner.sha256
          chmod +x osv-scanner
          sudo mv osv-scanner /usr/local/bin/

      - name: Audit dependencies
        run: osv-scanner --lockfile=bun.lock

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: gitleaks detect --source . --verbose

  docker-scan:
    name: Docker Image Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t jump-sveltekit:scan ./frontend

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "jump-sveltekit:scan"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL,HIGH"
